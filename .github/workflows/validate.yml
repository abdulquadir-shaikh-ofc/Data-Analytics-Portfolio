name: Validate Repository

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate Sales & Retail Analytics project
        run: |
          echo "🔍 Validating Sales & Retail Analytics project..."
          
          PROJECT_PATH="projects/sales-retail-analytics"
          
          # Check HTML file exists
          if [ ! -f "$PROJECT_PATH/sales-retail-analytics.html" ]; then
            echo "❌ Missing: sales-retail-analytics.html"
            exit 1
          fi
          echo "✅ HTML file found"
          
          # Check PBIP folder exists
          if [ ! -d "$PROJECT_PATH/pbip" ]; then
            echo "❌ Missing: pbip folder"
            exit 1
          fi
          echo "✅ PBIP folder found"
          
          # Check dataset folder exists
          if [ ! -d "$PROJECT_PATH/dataset" ]; then
            echo "❌ Missing: dataset folder"
            exit 1
          fi
          echo "✅ Dataset folder found"
          
          # Check CSV file exists
          if [ ! -f "$PROJECT_PATH/dataset/superstore_updated_cleaned_product.csv" ]; then
            echo "❌ Missing: superstore_updated_cleaned_product.csv"
            exit 1
          fi
          echo "✅ CSV file found"
          
          echo ""
          echo "✅ All validations passed!"
