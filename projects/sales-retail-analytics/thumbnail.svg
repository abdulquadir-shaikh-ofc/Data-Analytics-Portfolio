<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sales &amp; Retail Analytics Dashboard preview">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C8FF0"/>
      <stop offset="100%" stop-color="#5B6FE0"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#667eea"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Header -->
  <rect x="24" y="24" width="700" height="78" rx="14" fill="#f8fafc"/>
  <rect x="42" y="42" width="42" height="42" rx="9" fill="#4f46e5"/>
  <rect x="50" y="64" width="6" height="12" rx="1.5" fill="#c7d2fe"/>
  <rect x="60" y="56" width="6" height="20" rx="1.5" fill="#e0e7ff"/>
  <rect x="70" y="50" width="6" height="26" rx="1.5" fill="#ffffff"/>
  <text x="98" y="65" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="700" fill="#3730a3">Sales &amp; Retail Analytics Dashboard</text>
  <text x="98" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#6366f1">Sales Performance Overview</text>

  <rect x="748" y="24" width="428" height="78" rx="14" fill="#f8fafc" opacity="0.85"/>
  <circle cx="800" cy="63" r="6" fill="#cbd5e1"/>
  <circle cx="826" cy="63" r="6" fill="#cbd5e1"/>
  <circle cx="852" cy="63" r="6" fill="#cbd5e1"/>

  <!-- KPI cards -->
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="24" y="118" width="217.6" height="108" rx="12" fill="#f8fafc"/>
    <rect x="24" y="118" width="217.6" height="5" rx="2.5" fill="#667eea"/>
    <text x="44" y="156" font-size="13" fill="#64748b">Total Sales</text>
    <text x="44" y="196" font-size="30" font-weight="700" fill="#3730a3">$24.5M</text>

    <rect x="257.6" y="118" width="217.6" height="108" rx="12" fill="#f8fafc"/>
    <rect x="257.6" y="118" width="217.6" height="5" rx="2.5" fill="#10B981"/>
    <text x="277.6" y="156" font-size="13" fill="#64748b">Gross Profit</text>
    <text x="277.6" y="196" font-size="30" font-weight="700" fill="#047857">$7.8M</text>

    <rect x="491.2" y="118" width="217.6" height="108" rx="12" fill="#f8fafc"/>
    <rect x="491.2" y="118" width="217.6" height="5" rx="2.5" fill="#3B82F6"/>
    <text x="511.2" y="156" font-size="13" fill="#64748b">Orders</text>
    <text x="511.2" y="196" font-size="30" font-weight="700" fill="#1d4ed8">59,832</text>

    <rect x="724.8" y="118" width="217.6" height="108" rx="12" fill="#f8fafc"/>
    <rect x="724.8" y="118" width="217.6" height="5" rx="2.5" fill="#EC4899"/>
    <text x="744.8" y="156" font-size="13" fill="#64748b">Customers</text>
    <text x="744.8" y="196" font-size="30" font-weight="700" fill="#be185d">12,406</text>

    <rect x="958.4" y="118" width="217.6" height="108" rx="12" fill="#f8fafc"/>
    <rect x="958.4" y="118" width="217.6" height="5" rx="2.5" fill="#F59E0B"/>
    <text x="978.4" y="156" font-size="13" fill="#64748b">Avg. Margin</text>
    <text x="978.4" y="196" font-size="30" font-weight="700" fill="#b45309">31.8%</text>
  </g>

  <!-- Main chart panel: sales by category (bars) + profit trend (line) -->
  <rect x="24" y="250" width="1152" height="288" rx="14" fill="#f8fafc"/>
  <text x="48" y="284" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600" fill="#334155">Sales by Category</text>

  <g>
    <rect x="60"  y="430" width="76" height="80"  rx="4" fill="#667eea"/>
    <rect x="160" y="380" width="76" height="130" rx="4" fill="#10B981"/>
    <rect x="260" y="340" width="76" height="170" rx="4" fill="#F59E0B"/>
    <rect x="360" y="400" width="76" height="110" rx="4" fill="#EF4444"/>
    <rect x="460" y="320" width="76" height="190" rx="4" fill="#3B82F6"/>
    <rect x="560" y="360" width="76" height="150" rx="4" fill="#EC4899"/>
    <rect x="660" y="300" width="76" height="210" rx="4" fill="#14B8A6"/>
    <rect x="760" y="420" width="76" height="90"  rx="4" fill="#8B5CF6"/>
  </g>

  <!-- profit trend line overlay -->
  <polyline points="98,470 198,440 298,455 398,410 498,425 598,380 698,400 798,460"
            fill="none" stroke="#1f2937" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
  <g fill="#1f2937" opacity="0.55">
    <circle cx="98" cy="470" r="4"/>
    <circle cx="198" cy="440" r="4"/>
    <circle cx="298" cy="455" r="4"/>
    <circle cx="398" cy="410" r="4"/>
    <circle cx="498" cy="425" r="4"/>
    <circle cx="598" cy="380" r="4"/>
    <circle cx="698" cy="400" r="4"/>
    <circle cx="798" cy="460" r="4"/>
  </g>

  <line x1="60" y1="510" x2="836" y2="510" stroke="#e2e8f0" stroke-width="2"/>

  <!-- regional donut -->
  <circle cx="990" cy="400" r="80" fill="none" stroke="#e2e8f0" stroke-width="34"/>
  <circle cx="990" cy="400" r="80" fill="none" stroke="#667eea" stroke-width="34"
          stroke-dasharray="201.06 301.59" transform="rotate(-90 990 400)"/>
  <circle cx="990" cy="400" r="80" fill="none" stroke="#14B8A6" stroke-width="34"
          stroke-dasharray="140.74 361.91" stroke-dashoffset="-201.06" transform="rotate(-90 990 400)"/>
  <circle cx="990" cy="400" r="80" fill="none" stroke="#F59E0B" stroke-width="34"
          stroke-dasharray="90.48 412.17" stroke-dashoffset="-341.80" transform="rotate(-90 990 400)"/>
  <circle cx="990" cy="400" r="80" fill="none" stroke="#EC4899" stroke-width="34"
          stroke-dasharray="70.37 432.28" stroke-dashoffset="-432.28" transform="rotate(-90 990 400)"/>
  <text x="990" y="396" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#334155">5 Regions</text>
  <text x="990" y="416" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#64748b">by Sales</text>

  <!-- Bottom panels -->
  <rect x="24" y="556" width="560" height="220" rx="14" fill="#f8fafc"/>
  <text x="48" y="590" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600" fill="#334155">Top Products</text>
  <g>
    <rect x="48" y="608" width="420" height="20" rx="6" fill="#667eea"/>
    <rect x="48" y="640" width="360" height="20" rx="6" fill="#10B981"/>
    <rect x="48" y="672" width="310" height="20" rx="6" fill="#3B82F6"/>
    <rect x="48" y="704" width="250" height="20" rx="6" fill="#EC4899"/>
    <rect x="48" y="736" width="190" height="20" rx="6" fill="#14B8A6"/>
  </g>

  <rect x="616" y="556" width="560" height="220" rx="14" fill="#f8fafc"/>
  <text x="640" y="590" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600" fill="#334155">Customer Growth Trend</text>
  <polyline points="640,740 720,720 800,700 880,660 960,630 1040,600 1120,580"
            fill="none" stroke="#8B5CF6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="640,740 720,720 800,700 880,660 960,630 1040,600 1120,580 1120,756 640,756"
           fill="#8B5CF6" opacity="0.12"/>
  <g fill="#8B5CF6">
    <circle cx="640" cy="740" r="5"/>
    <circle cx="720" cy="720" r="5"/>
    <circle cx="800" cy="700" r="5"/>
    <circle cx="880" cy="660" r="5"/>
    <circle cx="960" cy="630" r="5"/>
    <circle cx="1040" cy="600" r="5"/>
    <circle cx="1120" cy="580" r="5"/>
  </g>
</svg>
